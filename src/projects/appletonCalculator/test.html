<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Counter</title>
  </head>
  <body>
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        font-family: sans-serif;
        background-color: #f5f5f5;
      }

      .container {
        text-align: center;
      }

      .text {
        font-size: 1.2rem;
      }

      .number {
        font-size: 3rem;
        font-weight: bold;
        transition: color 0.2s ease;
      }

      .number.negative {
        color: red;
      }

      .number.positive {
        color: green;
      }

      .number.zero {
        color: blue;
      }

      .btn-group {
        display: flex;
        gap: 10px;
        justify-content: center;
      }

      .btn {
        padding: 10px 20px;
        font-size: 1rem;
        border: none;
        border-radius: 6px;
        background-color: #333;
        color: white;
        cursor: pointer;
      }

      .btn:hover {
        background-color: #555;
      }
    </style>
    <div class="container">
      <p class="text">Click the button to increase the number</p>
      <p class="number" id="number">0</p>
      <div class="btn-group">
        <button class="btn" id="decreaseBtn">Decrease</button>
        <button class="btn" id="increaseBtn">Increase</button>
      </div>
    </div>
    <script>
      const numberEl = document.getElementById("number");
      const increaseBtn = document.getElementById("increaseBtn");
      const decreaseBtn = document.getElementById("decreaseBtn");

      let count = 0;

      function updateDisplay() {
        numberEl.textContent = count;
        numberEl.classList.remove("negative", "positive", "zero");
        if (count < 0) {
          numberEl.classList.add("negative");
        } else if (count > 0) {
          numberEl.classList.add("positive");
        } else {
          numberEl.classList.add("zero");
        }
      }

      increaseBtn.addEventListener("click", () => {
        count++;
        updateDisplay();
      });

      decreaseBtn.addEventListener("click", () => {
        count--;
        updateDisplay();
      });

      updateDisplay();
    </script>
  </body>
</html>
